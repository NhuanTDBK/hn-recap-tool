# Postgres and Redis are managed by infra-management/docker-compose.yml.
# Start that stack first before running this one.
#
# Container hostnames: infra-postgres, infra-redis (on infra-network).

services:
  # --- Unified pipeline scheduler (collect → crawl → summarize → deliver, hourly) ---

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: ${WORKER_IMAGE_NAME:-hnpal-app}
    container_name: ${SCHEDULER_CONTAINER_NAME:-hnpal-scheduler}
    command: ["python", "scripts/run_scheduler.py"]
    environment:
      - DATA_DIR=${APP_DATA_DIR:-/app/data}
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-infra-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hn_pal}
      - REDIS_URL=redis://${REDIS_HOST:-infra-redis}:${REDIS_PORT:-6379}
    env_file: .env
    volumes:
      - rocksdb_data:${APP_DATA_DIR:-/app/data}
    restart: ${RESTART_POLICY:-unless-stopped}
    mem_limit: ${SCHEDULER_MEM_LIMIT:-512m}

  # --- Supporting services ---

  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: ${WORKER_IMAGE_NAME:-hnpal-app}  # reuse built image
    container_name: ${BOT_CONTAINER_NAME:-hnpal-bot}
    command: ["python", "${BOT_COMMAND_PATH:-scripts/run_bot.py}"]
    environment:
      - DATA_DIR=${APP_DATA_DIR:-/app/data}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-infra-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hn_pal}
      - REDIS_URL=redis://${REDIS_HOST:-infra-redis}:${REDIS_PORT:-6379}
    env_file: .env
    volumes:
      - rocksdb_data:${APP_DATA_DIR:-/app/data}
    restart: ${RESTART_POLICY:-unless-stopped}
    mem_limit: ${BOT_MEM_LIMIT:-256m}

volumes:
  rocksdb_data:
    driver: local

networks:
  default:
    name: ${INFRA_NETWORK_NAME:-infra-network}
    external: true
